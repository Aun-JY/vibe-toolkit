<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .f-orbit { fill:none; stroke:rgba(0,255,136,0.25); stroke-width:0.9; }
      .f-edge  { stroke:rgba(0,255,136,0.45); stroke-width:0.9; stroke-linecap:round; fill:none; }
      .f-wave  { fill:none; stroke:rgba(0,255,136,0.65); stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; }
      .f-node  { fill:#00FF88; }
    </style>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#172318"/>
      <stop offset="100%" stop-color="#0a0e0b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="url(#bg-glow)"/>
  <rect width="48" height="48" rx="11" fill="none" stroke="rgba(0,255,136,0.30)" stroke-width="1.2"/>

  <!-- Orbital rings -->
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5"/>
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5" transform="rotate(60 24 21)" style="stroke:rgba(0,255,136,0.14)"/>
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5" transform="rotate(120 24 21)" style="stroke:rgba(0,255,136,0.07)"/>

  <!-- Neural edges -->
  <line class="f-edge" x1="24" y1="8"  x2="11" y2="18"/>
  <line class="f-edge" x1="24" y1="8"  x2="37" y2="18"/>
  <line class="f-edge" x1="11" y1="18" x2="24" y2="30"/>
  <line class="f-edge" x1="37" y1="18" x2="24" y2="30"/>
  <line class="f-edge" x1="11" y1="18" x2="37" y2="18" style="stroke:rgba(0,255,136,0.22)"/>
  <line class="f-edge" x1="24" y1="8"  x2="24" y2="30"  style="stroke:rgba(0,255,136,0.18)"/>

  <!-- Waveform (bottom) -->
  <polyline class="f-wave" points="5,40 8,40 10,37 13,43 16,38 19,42 24,33 29,42 32,38 35,43 38,37 40,40 43,40"/>

  <!-- Neural nodes -->
  <circle class="f-node" cx="24" cy="8"  r="2.0"/>
  <circle class="f-node" cx="11" cy="18" r="2.0"/>
  <circle class="f-node" cx="37" cy="18" r="2.0"/>
  <circle class="f-node" cx="24" cy="30" r="1.6" style="opacity:.75"/>

  <!-- Core glow halo -->
  <circle cx="24" cy="21" r="5.5" fill="rgba(0,255,136,0.07)"/>
  <!-- Core -->
  <circle cx="24" cy="21" r="3.2" fill="#00FF88"/>
</svg>
