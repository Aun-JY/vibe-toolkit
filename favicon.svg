<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <style>
      .f-orbit { fill:none; stroke:rgba(17,24,39,0.18); stroke-width:0.9; }
      .f-edge  { stroke:rgba(17,24,39,0.45); stroke-width:0.9; stroke-linecap:round; fill:none; }
      .f-wave  { fill:none; stroke:rgba(17,24,39,0.65); stroke-width:1.1; stroke-linecap:round; stroke-linejoin:round; }
      .f-node  { fill:#111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="11" fill="#ffffff"/>
  <rect width="48" height="48" rx="11" fill="none" stroke="#111827" stroke-width="1.8"/>

  <!-- Orbital rings -->
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5"/>
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5" transform="rotate(60 24 21)" style="stroke:rgba(17,24,39,0.10)"/>
  <ellipse class="f-orbit" cx="24" cy="21" rx="15" ry="5.5" transform="rotate(120 24 21)" style="stroke:rgba(17,24,39,0.06)"/>

  <!-- Neural edges -->
  <line class="f-edge" x1="24" y1="8"  x2="11" y2="18"/>
  <line class="f-edge" x1="24" y1="8"  x2="37" y2="18"/>
  <line class="f-edge" x1="11" y1="18" x2="24" y2="30"/>
  <line class="f-edge" x1="37" y1="18" x2="24" y2="30"/>
  <line class="f-edge" x1="11" y1="18" x2="37" y2="18" style="stroke:rgba(17,24,39,0.25)"/>
  <line class="f-edge" x1="24" y1="8"  x2="24" y2="30"  style="stroke:rgba(17,24,39,0.20)"/>

  <!-- Waveform -->
  <polyline class="f-wave" points="5,40 8,40 10,37 13,43 16,38 19,42 24,33 29,42 32,38 35,43 38,37 40,40 43,40"/>

  <!-- Neural nodes -->
  <circle class="f-node" cx="24" cy="8"  r="2.0"/>
  <circle class="f-node" cx="11" cy="18" r="2.0"/>
  <circle class="f-node" cx="37" cy="18" r="2.0"/>
  <circle class="f-node" cx="24" cy="30" r="1.6" style="opacity:.7"/>

  <!-- Core halo -->
  <circle cx="24" cy="21" r="5.5" fill="rgba(17,24,39,0.05)"/>
  <!-- Core -->
  <circle cx="24" cy="21" r="3.2" fill="#111827"/>
</svg>
